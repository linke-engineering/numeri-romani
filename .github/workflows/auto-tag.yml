# -----------------------------------------------------------------------------
# GitHub Actions Workflow: Auto Tag on Merge to Main
#
# Purpose:
#   Automatically create a Git tag based on the version in the .csproj file
#   when changes are merged into the main branch.
# -----------------------------------------------------------------------------

name: Auto Tag on Merge to Main

on:
  push:
    branches:
      - main

jobs:
  auto-tag:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Extract version from project file
        id: get_version
        run: |
          VERSION=$(grep -oPm1 '(?<=<Version>)[^<]+' src/NumeriRomani/NumeriRomani.csproj || echo "0.0.0")
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Create Git tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git tag -a "v${{ env.VERSION }}" -m "Release version ${{ env.VERSION }}"
          git push origin "v${{ env.VERSION }}"