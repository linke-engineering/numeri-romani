# -----------------------------------------------------------------------------
# GitHub Actions Workflow: Publish to NuGet
#
# Purpose:
#   This workflow builds, tests, and publishes the Numeri Romani .NET library
#   to NuGet when a new release is published in the main branch.
#
# Prerequisites:
#   - The repository must contain a valid .NET 8 project.
#   - The NuGet API key must be stored in the repository secrets as NUGET_API_KEY.
#   - The release tag must follow the format: v<major>.<minor>.<patch> (e.g., v1.2.3).
# -----------------------------------------------------------------------------

name: Publish to NuGet

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to publish'
        required: true
        default: 'main'

env:
  DOTNET_VERSION: '8.0.x'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Setup .NET Core
        uses: actions/setup-dotnet@v1
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Run tests
        run: dotnet test --configuration Release --no-build --verbosity normal

      - name: Extract version from release
        id: get_version
        run: |
          VERSION=$(echo "${GITHUB_REF#refs/tags/v}" | grep -oE '^[0-9]+\.[0-9]+\.[0-9]+')
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Debug file paths
        run: |
          pwd
          ls -la
          ls -la src/NumeriRomani
          ls -la assets

      - name: Pack
        run: dotnet pack --configuration Release --no-restore --output ./nupkg /p:Version=${{ env.VERSION }}

      - name: Publish to NuGet
        run: dotnet nuget push ./nupkg/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json
